<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoT Quiz game
  </title>
  <link rel="stylesheet" href="./assets/style.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Ballet&family=Shadows+Into+Light&display=swap" rel="stylesheet">
</head>

<body>
  <h1>GoT Quiz Game</h1>
  <h3>Score: <span id="score">0</span> of <span id="totalQuestions"></span></h3>
  <div class="container">
    <div class="gameFace">
      <img class="story" src="./assets/img/intro.jpg" alt="">
      <div class="questionBox">
        <p class="question">How well do you know your 'Game of Thrones' trivia? Can you achieve the Iron Throne or are
          you destined to
          join the Night's Watch along the Wall?</p>
        <button class="playGame btn" onclick="displayQuestion(questions)">Start the quiz!</button>



      </div>
      
    </div>

    <script src="app.js"></script>
</body>

</html>
